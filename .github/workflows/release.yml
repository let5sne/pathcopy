name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen

      - name: Build
        run: ./scripts/build.sh

      - name: Package
        run: ./scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PathCopy
          path: |
            dist/PathCopy.zip
            dist/PathCopy.zip.sha256

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/PathCopy.zip \
            dist/PathCopy.zip.sha256 \
            --title "PathCopy $GITHUB_REF_NAME" \
            --notes "Finder right-click extension to copy full file and folder paths. This early build is signed ad hoc and not notarized."

